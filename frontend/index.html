<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIRS — Analyst Login</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #060a0f;
    --panel:    #0b1220;
    --border:   #1a3a5c;
    --accent:   #00d4ff;
    --accent2:  #ff3e6c;
    --green:    #00ff9d;
    --text:     #c9d8e8;
    --muted:    #4a6a8a;
    --danger:   #ff3e6c;
  }
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridMove 20s linear infinite;
    pointer-events: none;
  }
  @keyframes gridMove { from{background-position:0 0} to{background-position:40px 40px} }

  /* Scanlines */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
    pointer-events: none;
    z-index: 100;
  }

  /* Glow orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    opacity: 0.18;
    animation: orbFloat 8s ease-in-out infinite;
  }
  .orb1 { width:500px; height:500px; background:var(--accent); top:-100px; right:-100px; animation-delay:0s; }
  .orb2 { width:400px; height:400px; background:var(--accent2); bottom:-100px; left:-100px; animation-delay:-4s; }
  @keyframes orbFloat { 0%,100%{transform:translate(0,0)} 50%{transform:translate(30px,-30px)} }

  .login-wrap {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 440px;
    padding: 20px;
  }

  /* Logo / header */
  .logo-block {
    text-align: center;
    margin-bottom: 36px;
    animation: fadeDown 0.6s ease both;
  }
  .logo-icon {
    font-size: 48px;
    margin-bottom: 12px;
    filter: drop-shadow(0 0 20px var(--accent));
    animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{filter:drop-shadow(0 0 20px var(--accent))} 50%{filter:drop-shadow(0 0 40px var(--accent))} }
  .logo-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 28px;
    color: var(--accent);
    letter-spacing: 6px;
    text-transform: uppercase;
  }
  .logo-sub {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 3px;
    margin-top: 6px;
    text-transform: uppercase;
  }

  /* Card */
  .card {
    background: rgba(11,18,32,0.9);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 36px;
    position: relative;
    animation: fadeUp 0.6s 0.2s ease both;
    backdrop-filter: blur(20px);
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 20px; right: 20px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  /* Corner decorations */
  .card::after {
    content: '';
    position: absolute;
    top: -1px; right: -1px;
    width: 20px; height: 20px;
    border-top: 2px solid var(--accent);
    border-right: 2px solid var(--accent);
  }
  .corner-bl {
    position: absolute;
    bottom: -1px; left: -1px;
    width: 20px; height: 20px;
    border-bottom: 2px solid var(--accent2);
    border-left: 2px solid var(--accent2);
  }

  .section-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-label::after { content:''; flex:1; height:1px; background:var(--border); }

  .field { margin-bottom: 20px; }
  .field label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
    font-family: 'Share Tech Mono', monospace;
  }
  .field input {
    width: 100%;
    background: rgba(0,212,255,0.04);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 15px;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    border-radius: 2px;
  }
  .field input:focus {
    border-color: var(--accent);
    background: rgba(0,212,255,0.08);
    box-shadow: 0 0 20px rgba(0,212,255,0.1);
  }

  .btn-login {
    width: 100%;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    letter-spacing: 4px;
    text-transform: uppercase;
    padding: 14px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: color 0.3s, background 0.3s;
    margin-top: 8px;
    border-radius: 2px;
  }
  .btn-login::before {
    content: '';
    position: absolute; inset: 0;
    background: var(--accent);
    transform: translateX(-100%);
    transition: transform 0.3s ease;
    z-index: -1;
  }
  .btn-login:hover { color: var(--bg); }
  .btn-login:hover::before { transform: translateX(0); }
  .btn-login:active { transform: scale(0.98); }
  .btn-login.loading { opacity: 0.7; pointer-events: none; }

  .error-msg {
    background: rgba(255,62,108,0.1);
    border: 1px solid rgba(255,62,108,0.3);
    color: var(--accent2);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    padding: 10px 14px;
    margin-top: 16px;
    display: none;
    border-radius: 2px;
  }
  .error-msg.show { display: block; animation: shake 0.4s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }

  .demo-hint {
    text-align: center;
    margin-top: 20px;
    font-size: 12px;
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
  }
  .demo-hint span { color: var(--accent); }

  @keyframes fadeDown { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeUp   { from{opacity:0;transform:translateY(20px)}  to{opacity:1;transform:translateY(0)} }

  /* Status bar */
  .status-bar {
    display: flex;
    justify-content: space-between;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 20px;
    padding: 0 4px;
    animation: fadeUp 0.6s 0.4s ease both;
  }
  .status-dot { width:6px; height:6px; border-radius:50%; background:var(--green); display:inline-block; margin-right:6px; animation: blink 2s ease infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="login-wrap">
  <div class="logo-block">
    <div class="logo-icon">🛡️</div>
    <div class="logo-title">CIRS</div>
    <div class="logo-sub">Cybersecurity Incident Response System</div>
  </div>

  <div class="card">
    <div class="corner-bl"></div>
    <div class="section-label">Analyst Authentication</div>

    <div class="field">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="analyst@corp.com" autocomplete="off">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••••••" autocomplete="off">
    </div>

    <button class="btn-login" id="loginBtn" onclick="doLogin()">
      [ AUTHENTICATE ]
    </button>
    <div class="error-msg" id="errMsg">⚠ Invalid credentials. Access denied.</div>

    <div class="demo-hint">
      Demo: <span>riya@corp.com</span> / <span>password123</span>
    </div>
  </div>

  <div class="status-bar">
    <span><span class="status-dot"></span>SYSTEM ONLINE</span>
    <span id="clock"></span>
    <span>v1.0.0 — SECURE</span>
  </div>
</div>

<script>
  // Clock
  function tick() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toISOString().replace('T',' ').split('.')[0] + ' UTC';
  }
  tick(); setInterval(tick, 1000);

  // Enter key
  document.addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

  async function doLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('errMsg');

    if (!email || !password) {
      err.textContent = '⚠ Please enter email and password.';
      err.classList.add('show'); return;
    }

    btn.textContent = '[ AUTHENTICATING... ]';
    btn.classList.add('loading');
    err.classList.remove('show');

    try {
      const res = await fetch('http://localhost:3000/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();

      if (!res.ok) throw new Error(data.error);

      localStorage.setItem('cirs_token', data.token);
      localStorage.setItem('cirs_analyst', JSON.stringify(data.analyst));

      btn.textContent = '[ ACCESS GRANTED ]';
      btn.style.borderColor = 'var(--green)';
      btn.style.color = 'var(--green)';

      setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
    } catch (e) {
      btn.textContent = '[ AUTHENTICATE ]';
      btn.classList.remove('loading');
      err.textContent = '⚠ ' + (e.message || 'Connection failed. Is the server running?');
      err.classList.remove('show');
      void err.offsetWidth;
      err.classList.add('show');
    }
  }
</script>
</body>
</html>
