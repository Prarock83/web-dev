<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIRS — Security Events</title>
<link rel="stylesheet" href="../css/main.css">
</head>
<body>
<div class="app-layout">

  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="icon">🛡️</div>
      <div class="title">CIRS</div>
      <div class="sub">Incident Response</div>
    </div>
    <nav class="nav-section">
      <div class="nav-label">Navigation</div>
      <a href="dashboard.html" class="nav-item" data-page="dashboard"><span class="nav-icon">⬡</span> Dashboard</a>
      <a href="events.html" class="nav-item" data-page="events"><span class="nav-icon">⚡</span> Events</a>
      <a href="alerts.html" class="nav-item" data-page="alerts"><span class="nav-icon">🔔</span> Alerts
        <span class="nav-badge" id="alertBadge" style="display:none">0</span>
      </a>
      <a href="incidents.html" class="nav-item" data-page="incidents"><span class="nav-icon">⚠</span> Incidents</a>
    </nav>
    <div class="sidebar-footer">
      <div class="analyst-info">
        <div class="analyst-avatar" id="analystInitials">--</div>
        <div>
          <div class="analyst-name" id="analystName">Loading...</div>
          <div class="analyst-role" id="analystRole"></div>
        </div>
      </div>
      <button class="btn-logout" onclick="logout()">[ SIGN OUT ]</button>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="topbar-title">CIRS / <span>Security Events</span></div>
      <div class="topbar-right">
        <div class="topbar-clock" id="clock"></div>
        <div class="status-pill">MONITORING</div>
      </div>
    </div>

    <div class="page-content">

      <!-- TOOLBAR -->
      <div class="flex items-center gap-4 mb-6" style="justify-content:space-between;flex-wrap:wrap">
        <div class="filters-bar">
          <input class="search-input" id="searchInput" placeholder="Search event type or IP..." oninput="debounceLoad()">
          <select class="filter-select" id="sevFilter" onchange="loadEvents()">
            <option value="">All Severities</option>
            <option>Critical</option><option>High</option><option>Medium</option><option>Low</option>
          </select>
        </div>
        <button class="btn btn-primary" onclick="openModal('addEventModal')">+ Add Event</button>
      </div>

      <!-- TABLE -->
      <div class="panel anim-up">
        <div class="panel-header">
          <div class="panel-title">Security Events Log</div>
          <span id="eventsCount" class="text-muted text-sm text-mono">—</span>
        </div>
        <div style="overflow-x:auto">
          <table class="data-table" id="eventsTable">
            <thead>
              <tr>
                <th>#</th><th>Event Type</th><th>Severity</th>
                <th>Source IP</th><th>Dest IP</th><th>Protocol</th>
                <th>Threat</th><th>CVE</th><th>Timestamp</th><th>Actions</th>
              </tr>
            </thead>
            <tbody><tr class="loading-row"><td colspan="10">Loading events...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ADD EVENT MODAL -->
<div class="modal-overlay" id="addEventModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Log New Event</div>
      <button class="modal-close" onclick="closeModal('addEventModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">Event Type *</label>
          <input class="form-input" id="evType" placeholder="e.g. Brute Force SSH">
        </div>
        <div class="form-group">
          <label class="form-label">Severity *</label>
          <select class="form-select" id="evSev">
            <option>Critical</option><option>High</option><option>Medium</option><option>Low</option>
          </select>
        </div>
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">Source IP</label>
          <input class="form-input" id="evSrcIp" placeholder="192.168.1.100">
        </div>
        <div class="form-group">
          <label class="form-label">Destination IP</label>
          <input class="form-input" id="evDstIp" placeholder="10.0.0.1">
        </div>
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">Protocol</label>
          <select class="form-select" id="evProto">
            <option value="">— Select —</option>
            <option>TCP</option><option>UDP</option><option>HTTP</option>
            <option>HTTPS</option><option>SMTP</option><option>SSH</option><option>SMB</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Linked Threat</label>
          <select class="form-select" id="evThreat">
            <option value="">— None —</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Linked Vulnerability</label>
        <select class="form-select" id="evVuln">
          <option value="">— None —</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="form-textarea" id="evDesc" placeholder="Describe the security event..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger" onclick="closeModal('addEventModal')">Cancel</button>
      <button class="btn btn-primary" onclick="submitEvent()">Log Event</button>
    </div>
  </div>
</div>

<script src="../js/app.js"></script>
<script>
  requireAuth();
  initSidebar('events');
  initClock('clock');
  loadEvents();
  loadRefData();

  let _searchTimer;
  function debounceLoad() { clearTimeout(_searchTimer); _searchTimer = setTimeout(loadEvents, 350); }

  async function loadEvents() {
    const search = document.getElementById('searchInput').value;
    const severity = document.getElementById('sevFilter').value;
    const tbody = document.querySelector('#eventsTable tbody');
    tbody.innerHTML = '<tr class="loading-row"><td colspan="10">Loading...</td></tr>';
    try {
      let qs = new URLSearchParams();
      if (severity) qs.set('severity', severity);
      if (search)   qs.set('search', search);
      qs.set('limit', '100');
      const data = await api('/events?' + qs);
      document.getElementById('eventsCount').textContent = data.length + ' records';
      if (!data.length) {
        tbody.innerHTML = '<tr class="loading-row"><td colspan="10">No events found</td></tr>';
        return;
      }
      tbody.innerHTML = data.map(e => `
        <tr>
          <td class="mono text-muted">${e.event_id}</td>
          <td style="font-weight:600">${e.event_type}</td>
          <td>${severityBadge(e.severity)}</td>
          <td>${fmtIp(e.source_ip)}</td>
          <td>${fmtIp(e.dest_ip)}</td>
          <td class="mono text-sm text-muted">${e.protocol || '—'}</td>
          <td style="font-size:12px">${e.threat_name ? `<span style="color:var(--yellow)">${e.threat_name}</span>` : '<span class="text-muted">—</span>'}</td>
          <td class="mono text-sm">${e.cve_id ? `<span style="color:var(--accent2)">${e.cve_id}</span>` : '<span class="text-muted">—</span>'}</td>
          <td class="mono text-sm text-muted">${fmtTime(e.timestamp)}</td>
          <td>
            <button class="btn btn-danger btn-sm" onclick="deleteEvent(${e.event_id})">DEL</button>
          </td>
        </tr>
      `).join('');
    } catch(e) {
      tbody.innerHTML = `<tr class="loading-row"><td colspan="10" style="color:var(--accent2)">Error: ${e.message}</td></tr>`;
    }
  }

  async function loadRefData() {
    try {
      const [threats, vulns] = await Promise.all([api('/threats'), api('/vulnerabilities')]);
      const ts = document.getElementById('evThreat');
      threats.forEach(t => ts.innerHTML += `<option value="${t.threat_id}">${t.threat_name}</option>`);
      const vs = document.getElementById('evVuln');
      vulns.forEach(v => vs.innerHTML += `<option value="${v.vuln_id}">${v.cve_id} — ${v.name}</option>`);
    } catch {}
  }

  async function submitEvent() {
    const body = {
      event_type: document.getElementById('evType').value.trim(),
      severity:   document.getElementById('evSev').value,
      source_ip:  document.getElementById('evSrcIp').value.trim(),
      dest_ip:    document.getElementById('evDstIp').value.trim(),
      protocol:   document.getElementById('evProto').value,
      description:document.getElementById('evDesc').value.trim(),
      threat_id:  document.getElementById('evThreat').value || null,
      vuln_id:    document.getElementById('evVuln').value || null,
    };
    if (!body.event_type) { toast('Event type is required', 'error'); return; }
    try {
      await api('/events', { method:'POST', body });
      toast('Event logged successfully');
      closeModal('addEventModal');
      loadEvents();
      ['evType','evSrcIp','evDstIp','evDesc'].forEach(id => document.getElementById(id).value = '');
    } catch(e) { toast('Error: ' + e.message, 'error'); }
  }

  async function deleteEvent(id) {
    if (!confirm('Delete this event and all associated alerts?')) return;
    try {
      await api('/events/' + id, { method: 'DELETE' });
      toast('Event deleted');
      loadEvents();
    } catch(e) { toast('Error: ' + e.message, 'error'); }
  }
</script>
</body>
</html>
