<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIRS — Alerts</title>
<link rel="stylesheet" href="../css/main.css">
<style>
  .priority-Critical { border-left: 3px solid var(--accent2) !important; }
  .priority-High      { border-left: 3px solid var(--orange) !important; }
  .priority-Medium    { border-left: 3px solid var(--yellow) !important; }
  .priority-Low       { border-left: 3px solid var(--green)  !important; }
  .alert-card {
    background: rgba(11,18,32,0.8);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 16px 20px;
    margin-bottom: 12px;
    transition: border-color 0.2s, transform 0.2s;
    position: relative;
  }
  .alert-card:hover { border-color: rgba(0,212,255,0.3); transform: translateX(3px); }
  .alert-card-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; flex-wrap:wrap; gap:8px; }
  .alert-card-meta { display:flex; gap:20px; font-size:13px; color:var(--muted); flex-wrap:wrap; }
  .alert-card-meta span { display:flex; align-items:center; gap:5px; }
  .status-select {
    background: rgba(0,212,255,0.05);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    padding: 4px 8px;
    border-radius: 2px;
    cursor: pointer;
    letter-spacing: 1px;
    outline: none;
  }
  .status-select:focus { border-color: var(--accent); }
  .alert-title { font-size: 16px; font-weight: 700; }
</style>
</head>
<body>
<div class="app-layout">

  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="icon">🛡️</div>
      <div class="title">CIRS</div>
      <div class="sub">Incident Response</div>
    </div>
    <nav class="nav-section">
      <div class="nav-label">Navigation</div>
      <a href="dashboard.html" class="nav-item" data-page="dashboard"><span class="nav-icon">⬡</span> Dashboard</a>
      <a href="events.html"    class="nav-item" data-page="events"><span class="nav-icon">⚡</span> Events</a>
      <a href="alerts.html"    class="nav-item" data-page="alerts"><span class="nav-icon">🔔</span> Alerts
        <span class="nav-badge" id="alertBadge" style="display:none">0</span>
      </a>
      <a href="incidents.html" class="nav-item" data-page="incidents"><span class="nav-icon">⚠</span> Incidents</a>
    </nav>
    <div class="sidebar-footer">
      <div class="analyst-info">
        <div class="analyst-avatar" id="analystInitials">--</div>
        <div>
          <div class="analyst-name" id="analystName">Loading...</div>
          <div class="analyst-role" id="analystRole"></div>
        </div>
      </div>
      <button class="btn-logout" onclick="logout()">[ SIGN OUT ]</button>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="topbar-title">CIRS / <span>Alerts</span></div>
      <div class="topbar-right">
        <div class="topbar-clock" id="clock"></div>
        <div class="status-pill">MONITORING</div>
      </div>
    </div>

    <div class="page-content">

      <!-- TOOLBAR -->
      <div class="flex items-center gap-4 mb-6" style="justify-content:space-between;flex-wrap:wrap">
        <div class="filters-bar">
          <select class="filter-select" id="statusFilter" onchange="loadAlerts()">
            <option value="">All Statuses</option>
            <option>Open</option><option>In Progress</option><option>Resolved</option><option>Closed</option>
          </select>
          <select class="filter-select" id="prioFilter" onchange="loadAlerts()">
            <option value="">All Priorities</option>
            <option>Critical</option><option>High</option><option>Medium</option><option>Low</option>
          </select>
        </div>
        <div class="flex gap-3 items-center">
          <span id="alertsCount" class="text-muted text-sm text-mono">—</span>
          <button class="btn btn-primary" onclick="openModal('addAlertModal')">+ New Alert</button>
        </div>
      </div>

      <!-- ALERTS LIST -->
      <div id="alertsList">
        <div class="empty-state">
          <div class="empty-icon">🔔</div>
          <div>Loading alerts...</div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- ADD ALERT MODAL -->
<div class="modal-overlay" id="addAlertModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Create New Alert</div>
      <button class="modal-close" onclick="closeModal('addAlertModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Alert Type *</label>
        <input class="form-input" id="alType" placeholder="e.g. Ransomware Alert">
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">Priority *</label>
          <select class="form-select" id="alPrio">
            <option>Critical</option><option>High</option><option>Medium</option><option>Low</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Assign To</label>
          <select class="form-select" id="alAnalyst">
            <option value="">— Unassigned —</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Linked Event</label>
        <select class="form-select" id="alEvent">
          <option value="">— None —</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger" onclick="closeModal('addAlertModal')">Cancel</button>
      <button class="btn btn-primary" onclick="submitAlert()">Create Alert</button>
    </div>
  </div>
</div>

<script src="../js/app.js"></script>
<script>
  requireAuth();
  initSidebar('alerts');
  initClock('clock');
  loadAlerts();
  loadRefData();

  async function loadAlerts() {
    const status   = document.getElementById('statusFilter').value;
    const priority = document.getElementById('prioFilter').value;
    const container = document.getElementById('alertsList');
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">⌛</div><div>Loading...</div></div>';
    try {
      let qs = new URLSearchParams();
      if (status)   qs.set('status', status);
      if (priority) qs.set('priority', priority);
      const data = await api('/alerts?' + qs);
      document.getElementById('alertsCount').textContent = data.length + ' alerts';

      if (!data.length) {
        container.innerHTML = '<div class="empty-state"><div class="empty-icon">✓</div><div>No alerts found</div></div>';
        return;
      }

      container.innerHTML = data.map(a => `
        <div class="alert-card priority-${a.priority} anim-up">
          <div class="alert-card-top">
            <div class="alert-title">${a.alert_type}</div>
            <div class="flex gap-3 items-center">
              ${severityBadge(a.priority)}
              <select class="status-select" onchange="updateStatus(${a.alert_id}, this.value)">
                ${['Open','In Progress','Resolved','Closed'].map(s =>
                  `<option ${a.status===s?'selected':''}>${s}</option>`
                ).join('')}
              </select>
            </div>
          </div>
          <div class="alert-card-meta">
            <span>🆔 <span class="mono">#${a.alert_id}</span></span>
            <span>⚡ ${a.event_type || '—'}</span>
            <span>🌐 ${a.source_ip ? `<span class="mono" style="color:var(--accent)">${a.source_ip}</span>` : '—'}</span>
            <span>👤 ${a.analyst_name || 'Unassigned'}</span>
            ${a.threat_name ? `<span>🎯 <span style="color:var(--yellow)">${a.threat_name}</span></span>` : ''}
            <span>🕐 ${fmtTime(a.created_at)}</span>
          </div>
        </div>
      `).join('');
    } catch(e) {
      container.innerHTML = `<div class="empty-state"><div style="color:var(--accent2)">Error: ${e.message}</div></div>`;
    }
  }

  async function updateStatus(id, status) {
    try {
      await api('/alerts/' + id + '/status', { method:'PATCH', body:{ status } });
      toast('Status updated to ' + status);
    } catch(e) { toast('Error: ' + e.message, 'error'); }
  }

  async function loadRefData() {
    try {
      const [analysts, events] = await Promise.all([api('/analysts'), api('/events?limit=50')]);
      const as = document.getElementById('alAnalyst');
      analysts.forEach(a => as.innerHTML += `<option value="${a.analyst_id}">${a.name} (${a.role})</option>`);
      const ev = document.getElementById('alEvent');
      events.forEach(e => ev.innerHTML += `<option value="${e.event_id}">#${e.event_id} — ${e.event_type}</option>`);
    } catch {}
  }

  async function submitAlert() {
    const body = {
      alert_type:  document.getElementById('alType').value.trim(),
      priority:    document.getElementById('alPrio').value,
      assigned_to: document.getElementById('alAnalyst').value || null,
      event_id:    document.getElementById('alEvent').value || null,
    };
    if (!body.alert_type) { toast('Alert type is required', 'error'); return; }
    try {
      await api('/alerts', { method:'POST', body });
      toast('Alert created');
      closeModal('addAlertModal');
      document.getElementById('alType').value = '';
      loadAlerts();
    } catch(e) { toast('Error: ' + e.message, 'error'); }
  }
</script>
</body>
</html>
